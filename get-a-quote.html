    <meta property="og:title" content="Get an Assurance Quote | Instant Premium Estimates">
    <meta property="og:description" content="Get clear pricing tailored to your actual budget instantly via our semantic quotation hub.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

<header>
    <nav>
        <ul>
            <li><a href=”index.html”>Home</a></li>
            <li><a href=”about.html”>About Us</a></li>
            <li><a href=”services.html”>Services</a></li>

        </ul>
    </nav>
</header>
	
<main>
    <h1>Assurance</h1>
	
    <img src="images/getaquote.jpg" alt="getaquote" width="600" height="400">

    <h2>Get a Quick Quote</h2>
    <p>Fill in your details below and we will send you a price estimate.</p>

    <form class="quote-form">
        <label for="firstname">First Name:</label>
		<input type="text" id="firstname" name="firstname" required>
		
		
        <label for="surname">Surname:</label>
		<input type="text" id="surname" name="surname" required>
		
        <label for="phone">Contact Number:</label>
		<input type="tel" id="phone" name="phone" required>
		
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>
		
        <label for="home-address">Home Address:</label>
		<textarea id="home-address" name="home_address" rows="3" required></textarea>
		
        <label for="work-address">Work Address:</label>
		<textarea id="work-address" name="work_address" rows="3"></textarea>
        
        <label for="cover-type">What do you want to cover?</label>
		<select id="cover-type" name="cover_type" required>
		    <option value="">-- Please Select An Option --</option>
            <option value="car">Car Insurance</option>
            <option value="laptop">Laptop Cover</option>
            <option value="cellphone">Cell Phone</option>
            <option value="household">Household Insurance</option>
            <option value="pet">Pet Insurance</option>
            <option value="life">Life Cover</option>
        </select>
		
		<button type="submit">Submit Request</button>
	</form>
    <hr>
</main>
